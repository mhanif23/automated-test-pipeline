name: CI/CD Pipeline — Automated Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────────
  #  Unit & API Tests
  # ───────────────────────────────────────────────
  unit-and-api-tests:
    name: Unit & API Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run Unit Tests
        run: npm run test:unit

      - name: 🔌 Run API Tests
        run: npm run test:api

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

  # ───────────────────────────────────────────────
  #  Playwright E2E Tests
  # ───────────────────────────────────────────────
  playwright-e2e:
    name: Playwright E2E Tests
    needs: unit-and-api-tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🎭 Run Playwright Tests
        run: npm run test:e2e:playwright

      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ───────────────────────────────────────────────
  #  Selenium E2E Tests
  # ───────────────────────────────────────────────
  selenium-e2e:
    name: Selenium E2E Tests
    needs: unit-and-api-tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🌐 Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 🌐 Run Selenium Tests
        run: npm run test:e2e:selenium

      - name: 📊 Upload Selenium Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: selenium-report
          path: jest_html_reporters.html
          retention-days: 14

  # ───────────────────────────────────────────────
  #  Quality Gate & Deploy
  # ───────────────────────────────────────────────
  deploy:
    name: Deploy to Testing Environment
    needs: [playwright-e2e, selenium-e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Quality Gate Passed
        run: echo "All automated tests passed — quality gate cleared."

      - name: 🚀 Deploy (placeholder)
        run: |
          echo "──────────────────────────────────────────"
          echo "  Deploying to testing environment..."
          echo "  Replace this step with your actual"
          echo "  deployment script (e.g., Docker, AWS, Azure)."
          echo "──────────────────────────────────────────"
